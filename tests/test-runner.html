<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Bharat — Test Suite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .container { max-width: 860px; margin: 0 auto; }
    header { margin-bottom: 36px; }
    header h1 { font-size: 1.75rem; font-weight: 800; color: #f8fafc; }
    header p  { color: #94a3b8; margin-top: 6px; font-size: 0.9rem; }
    .summary {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .summary-card {
      flex: 1; min-width: 140px;
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #334155;
    }
    .summary-card .label { font-size: 0.78rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
    .summary-card .value { font-size: 2rem; font-weight: 800; margin-top: 4px; }
    .value.pass  { color: #22c55e; }
    .value.fail  { color: #ef4444; }
    .value.total { color: #f8fafc; }
    .suite { margin-bottom: 24px; }
    .suite-title {
      font-size: 1rem; font-weight: 700;
      color: #cbd5e1;
      padding: 10px 16px;
      background: #1e293b;
      border-radius: 8px 8px 0 0;
      border: 1px solid #334155;
      border-bottom: none;
      display: flex; align-items: center; gap: 8px;
    }
    .suite-title .badge {
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
    }
    .suite-title .badge.all-pass { background: #16a34a22; color: #22c55e; border: 1px solid #16a34a55; }
    .suite-title .badge.has-fail { background: #dc262622; color: #ef4444; border: 1px solid #dc262655; }
    .test-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px;
      border: 1px solid #334155;
      border-top: none;
      background: #111827;
      font-size: 0.875rem;
    }
    .test-item:last-child { border-radius: 0 0 8px 8px; }
    .test-item.pass { border-left: 3px solid #22c55e; }
    .test-item.fail { border-left: 3px solid #ef4444; }
    .test-icon { font-size: 1rem; line-height: 1; margin-top: 2px; }
    .test-name { flex: 1; color: #e2e8f0; }
    .test-error { color: #fca5a5; font-size: 0.8rem; margin-top: 4px; font-family: monospace; }
    .running-msg { color: #94a3b8; font-style: italic; margin-top: 16px; }
    .progress-bar-outer {
      height: 6px; background: #1e293b; border-radius: 3px;
      margin-bottom: 32px; overflow: hidden;
    }
    .progress-bar-inner {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #6366f1, #22c55e);
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🧪 Smart Bharat — Test Suite</h1>
      <p>Zero-dependency in-browser unit tests for all core utilities and logic.</p>
    </header>
    <div class="summary">
      <div class="summary-card">
        <div class="label">Total</div>
        <div class="value total" id="countTotal">—</div>
      </div>
      <div class="summary-card">
        <div class="label">Passed</div>
        <div class="value pass" id="countPass">—</div>
      </div>
      <div class="summary-card">
        <div class="label">Failed</div>
        <div class="value fail" id="countFail">—</div>
      </div>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
    <p class="running-msg" id="runningMsg">Running tests…</p>
    <div id="results"></div>
  </div>

  <script type="module">
    // ── Minimal test framework ───────────────────────────────────
    const suites   = [];
    let totalPass  = 0;
    let totalFail  = 0;

    function suite(name, fn) {
      suites.push({ name, fn });
    }
    // Exposed globally so test files can use it
    window.suite = suite;

    function assert(condition, label) {
      if (!condition) throw new Error(`Expected truthy, got: ${condition}`);
    }
    function assertEqual(a, b, label) {
      if (a !== b) throw new Error(`Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
    }
    function assertDeepEqual(a, b) {
      if (JSON.stringify(a) !== JSON.stringify(b))
        throw new Error(`Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
    }
    function assertThrows(fn) {
      let threw = false;
      try { fn(); } catch { threw = true; }
      if (!threw) throw new Error("Expected function to throw, but it did not");
    }
    window.assert = assert;
    window.assertEqual = assertEqual;
    window.assertDeepEqual = assertDeepEqual;
    window.assertThrows = assertThrows;

    // ── Load all test modules ────────────────────────────────────
    await import('./storage.test.js');
    await import('./parseAiJson.test.js');
    await import('./complaints.test.js');
    await import('./schemes.test.js');
    await import('./aiClient.test.js');

    // ── Run ──────────────────────────────────────────────────────
    const resultsEl    = document.getElementById('results');
    const countTotal   = document.getElementById('countTotal');
    const countPass    = document.getElementById('countPass');
    const countFail    = document.getElementById('countFail');
    const progressBar  = document.getElementById('progressBar');
    const runningMsg   = document.getElementById('runningMsg');

    for (const { name, fn } of suites) {
      const tests = fn();   // fn returns array of {label, fn}
      const suitePass = [];
      const suiteFail = [];

      for (const t of tests) {
        try {
          await t.fn();
          suitePass.push({ label: t.label });
          totalPass++;
        } catch (err) {
          suiteFail.push({ label: t.label, error: err.message });
          totalFail++;
        }
      }

      const allPass  = suiteFail.length === 0;
      const badgeClass = allPass ? 'all-pass' : 'has-fail';
      const badgeText  = allPass ? '✓ All passed' : `✗ ${suiteFail.length} failed`;

      const suiteEl = document.createElement('div');
      suiteEl.className = 'suite';
      suiteEl.innerHTML = `
        <div class="suite-title">
          📁 ${name}
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        ${[...suitePass.map(t => `
          <div class="test-item pass">
            <span class="test-icon">✅</span>
            <span class="test-name">${t.label}</span>
          </div>
        `), ...suiteFail.map(t => `
          <div class="test-item fail">
            <span class="test-icon">❌</span>
            <div>
              <div class="test-name">${t.label}</div>
              <div class="test-error">${t.error}</div>
            </div>
          </div>
        `)].join('')}
      `;
      resultsEl.appendChild(suiteEl);
    }

    const total = totalPass + totalFail;
    countTotal.textContent = total;
    countPass.textContent  = totalPass;
    countFail.textContent  = totalFail;
    progressBar.style.width = total > 0 ? `${(totalPass / total) * 100}%` : '0%';
    runningMsg.textContent = total > 0
      ? `${totalPass}/${total} tests passed`
      : 'No tests found.';
    if (totalFail === 0) runningMsg.style.color = '#22c55e';
    else runningMsg.style.color = '#ef4444';
  </script>
</body>
</html>
